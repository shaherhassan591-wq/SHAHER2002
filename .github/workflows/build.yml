name: Build & Package Offline Android APK ('أنا مسلم')

on:
  push:
    branches:
      - main
      - master
      - development
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-android:
    name: Build Android App (APK)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment with caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Set up Java JDK 21 for modern Gradle/Android compilation
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      # 4. Clean workspace structures to prevent stale cache interference
      - name: Clean Workspace Environments
        run: |
          echo "Clearing pre-existing artifacts..."
          rm -rf node_modules package-lock.json dist android

      # 5. Clean installation of npm development dependencies
      - name: Fresh Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # Ensure platform-specific tailwind compiler module for Linux is fetched securely
          npm install @tailwindcss/oxide-linux-x64 --legacy-peer-deps || echo "Optional Tailwind package sync skipped"

      # 6. Build the modern React static web application (Vite-optimized)
      - name: Build Web Application
        run: npm run build

      # 7. Initialize and synchronize the native Capacitor Android bundle (Prisinte Clean Build)
      - name: Hydrate Capacitor & Sync Android Platform
        run: |
          # Ensure Capacitor modules are installed
          npm install @capacitor/cli @capacitor/android
          
          # Force delete android directory in case of duplicate runs or caching
          rm -rf android
          
          echo "Initiating dynamic pristine Android project generation..."
          npx cap add android
          
          echo "Applying modern Java 21 & SDK 34 compatibility templates..."
          cp android-config/build.gradle android/build.gradle
          cp android-config/variables.gradle android/variables.gradle
          
          mkdir -p android/gradle/wrapper/
          cp android-config/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
          
          echo "Copying verified local gradle-wrapper.jar to android/gradle/wrapper/gradle-wrapper.jar..."
          cp android-config/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar || true
          
          # If the file is missing or corrupted (e.g. Git LFS pointer), download it raw from Gradle source
          if [ ! -f "android/gradle/wrapper/gradle-wrapper.jar" ] || [ $(wc -c < "android/gradle/wrapper/gradle-wrapper.jar") -lt 50000 ]; then
            echo "Local gradle-wrapper.jar is missing, corrupted, or an LFS pointer. Downloading a pristine wrapper jar..."
            curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar
          fi
          
          cp android-config/app-build.gradle android/app/build.gradle
          
          # Update and sync web assets with native platform gradle bundle
          npx cap sync android

      # 7.5. Generate Native App Resources (Icons & Splash screens)
      - name: Generate Native App Resources
        run: |
          # Prepare the assets directory if not already populated
          mkdir -p assets
          
          # Ensure assets/icon.png and assets/splash.png are present
          if [ -f "assets/icon.png" ]; then
            echo "Icon detected! Copying to required formats..."
            cp assets/icon.png assets/icon-only.png || true
            cp assets/icon.png assets/icon-foreground.png || true
            cp assets/icon.png assets/icon-background.png || true
          fi
          
          if [ ! -f "assets/splash.png" ] && [ -f "public/splash_screen.jpg" ]; then
            echo "Generating splash screen from public asset..."
            cp public/splash_screen.jpg assets/splash.png
            cp public/splash_screen.jpg assets/splash-only.png || true
          fi
          
          # Execute the resource generator to populate mipmap/drawable sizes in android module
          npx @capacitor/assets generate --android

      # 8. Grant execution rights to Gradle Wrapper
      - name: Grant Executable Permission to Gradlew
        run: chmod +x android/gradlew

      # 9. Execute Gradle task to build the ready-to-install Android Debug APK
      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 10. Persist and expose the compiled .apk in Github Artifacts
      - name: Upload Compiled APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ana-Muslim-Offline-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 10
